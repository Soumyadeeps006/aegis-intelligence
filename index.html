<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis | Strategic Operations Command</title>
    
    <!-- SEO Best Practices -->
    <meta name="description" content="Aegis - Advanced geospatial mapping and entity relationship intelligence platform for SOC.">
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar glass-panel">
        <div class="brand">
            <div class="brand-icon"></div>
            <div class="brand-name">Aegis</div>
        </div>
        
        <nav>
            <ul class="nav-menu">
                <li class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
                    Geospatial Intel
                </li>
                <li class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                    Network Graph
                </li>
                <li class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Dossiers
                </li>
                <li class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    Alerts
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <!-- Top Navigation Bar -->
        <header class="top-bar glass-panel">
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="search-input" placeholder="Search entities, coordinates, or IDs..." id="globalSearch">
            </div>
            
            <div class="status-indicators">
                <div style="font-size: 0.85rem; color: var(--text-secondary);">DEFCON 4</div>
                <div class="status-dot"></div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div style="width: 32px; height: 32px; border-radius: 50%; background: #334155;"></div>
                    <span style="font-size: 0.9rem; font-weight: 600;">Agent Alpha</span>
                </div>
            </div>
        </header>

        <!-- Dashboard Area -->
        <section class="dashboard">
            <!-- Map Container -->
            <div id="map-container"></div>
            
            <!-- Right Overlay Panel for Data Feeds -->
            <aside class="overlay-panel panel-right glass-panel">
                <h2 class="widget-title">Live Intelligence Feed</h2>
                <div class="incident-list" id="incidentFeed">
                    <!-- Incidents will be populated by app.js -->
                </div>
            </aside>
        </section>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
